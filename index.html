<div class="page">
  <header class="hero">
    <h1>Full Retirement</h1>
    <div class="subhead">TIME REMAINING</div>
  </header>

  <main class="clock-grid" id="clock">
    <section class="clock-unit" data-unit="days">
      <div class="flip" id="flip-days"><!-- your flip tiles here --></div>
      <div class="label">DAYS</div>
    </section>

    <section class="clock-unit" data-unit="hours">
      <div class="flip" id="flip-hours"></div>
      <div class="label">HOURS</div>
    </section>

    <section class="clock-unit" data-unit="minutes">
      <div class="flip" id="flip-minutes"></div>
      <div class="label">MINUTES</div>
    </section>

    <section class="clock-unit" data-unit="seconds">
      <div class="flip" id="flip-seconds"></div>
      <div class="label">SECONDS</div>
    </section>
  </main>

  <footer class="footer">
    Retirement Date: <span class="date">September 29, 2026</span>
  </footer>
</div>

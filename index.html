<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Retirement Countdown</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.js"></script>
  </head>
  <body>
    <div id="flipdown" class="flipdown"></div>
    <script>
      const retirementDate =
        new Date("2026-09-29T00:00:00-05:00").getTime() / 1000;
    
      new FlipDown(retirementDate)
        .start();
    </script>
  </body>
</html>
